services:
  postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [auth-net]

  memcached:
    image: memcached:1.6-alpine
    container_name: auth-memcached
    command: ["-m", "64"]
    ports:
      - "${MEMCACHED_PORT}:11211"
    networks: [auth-net]

  mailpit:
    image: axllent/mailpit:latest
    container_name: auth-mailpit
    ports:
      - "${SMTP_PORT}:1025"
      - "${MAILPIT_UI_PORT}:8025"
    networks: [auth-net]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-service
    depends_on:
      postgres:
        condition: service_healthy
      memcached:
        condition: service_started
      mailpit:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      CACHE_HOST: memcached
      CACHE_PORT: 11211
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: no-reply@auth.local
      PROVIDER_PRIVATE_KEY_PATH: /app/keys/private.pem
      PROVIDER_PUBLIC_KEY_PATH: /app/keys/public.pem
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 50051
    volumes:
      - ./config:/app/config:ro
      - ./infra/keys:/app/keys:ro
    ports:
      - "${APP_GRPC_PORT}:50051"
    networks: [auth-net]
    restart: unless-stopped

volumes:
  pgdata:

networks:
  auth-net:
    driver: bridge
